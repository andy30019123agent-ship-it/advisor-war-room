<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>投顧戰情室 – 方向 A 粉白 2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF7F9;
    --card: #FFFFFF;
    --card-border: #F0E4EC;
    --primary: #E8A0BF;
    --primary-deep: #D97CA6;
    --text: #3A3440;
    --text-soft: #756D7A;
    --text-faint: #A79EAD;
    --green: #1F9D6B;
    --green-bg: #E7F6EF;
    --red: #E0526B;
    --red-bg: #FCEBEE;
    --amber: #C98A2C;
    --amber-bg: #FBF1E1;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    overflow-x: hidden;
  }
  .mono{ font-family: 'IBM Plex Mono', monospace; }
  .screen{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 100px;
    position: relative;
  }
  /* Header */
  header{
    padding: 20px 20px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .app-name{
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.2px;
  }
  .freshness{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background: var(--green-bg);
    color: var(--green);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 20px;
  }
  .freshness .dot{
    width:6px; height:6px; border-radius:50%; background: var(--green);
    box-shadow: 0 0 0 3px rgba(31,157,107,0.15);
  }
  /* Search */
  .search-wrap{ padding: 4px 20px 20px; }
  .search-bar{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--card);
    border: 1.5px solid var(--primary);
    border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 2px 10px rgba(232,160,191,0.18);
    min-height: 52px;
  }
  .search-bar svg{ flex-shrink:0; color: var(--primary-deep); }
  .search-bar span{
    font-size: 16px;
    font-weight: 600;
    color: var(--text-faint);
  }
  /* Sections */
  section{ padding: 4px 20px 8px; }
  .section-title{
    font-size: 14px;
    font-weight: 700;
    color: var(--text-soft);
    letter-spacing: 0.3px;
    margin-bottom: 10px;
    padding-top: 14px;
  }
  /* Summary card */
  .summary-card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 22px;
    box-shadow: 0 4px 18px rgba(58,52,64,0.05);
  }
  .summary-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap: 12px;
    margin-bottom: 18px;
  }
  .market-status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background: var(--amber-bg);
    color: var(--amber);
    font-weight: 800;
    font-size: 15px;
    padding: 8px 14px;
    border-radius: 12px;
  }
  .risk-meter{ text-align:right; }
  .risk-meter .label{ font-size:12px; color:var(--text-faint); font-weight:600; margin-bottom:2px;}
  .risk-meter .value{ font-size:26px; font-weight:800; color: var(--red); line-height:1; }
  .risk-meter .value small{ font-size:14px; color:var(--text-faint); font-weight:600; }
  .conclusion{
    font-size: 22px;
    font-weight: 800;
    line-height: 1.5;
    color: var(--text);
    padding-top: 14px;
    border-top: 1px dashed var(--card-border);
  }
  .conclusion .accent{ color: var(--primary-deep); }
  /* Holdings */
  .holding-card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: 0 2px 10px rgba(58,52,64,0.04);
  }
  .holding-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 12px;
  }
  .holding-name{ display:flex; flex-direction:column; gap:2px; }
  .holding-name .name{ font-size:17px; font-weight:800; }
  .holding-name .code{ font-size:13px; color:var(--text-faint); font-weight:600; }
  .holding-price{ text-align:right; }
  .holding-price .price{ font-size:20px; font-weight:700; }
  .holding-meta{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
  }
  .tag{
    font-size: 13px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 10px;
    background: #F7EEF3;
    color: var(--primary-deep);
  }
  .tag.stop{
    background: var(--red-bg);
    color: var(--red);
  }
  .tag.neutral{
    background: #F0F0F2;
    color: var(--text-soft);
  }
  /* Watchlist */
  .watch-card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    opacity: 0.92;
  }
  .watch-left{ display:flex; flex-direction:column; gap:2px; }
  .watch-left .name{ font-size:15px; font-weight:700; color: var(--text-soft); }
  .watch-left .code{ font-size:12px; color: var(--text-faint); }
  .watch-right{
    font-size: 13px;
    color: var(--text-faint);
    font-weight: 600;
  }
  /* Tab bar */
  .tabbar{
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--card-border);
    display:flex;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  }
  .tab{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 4px;
    padding: 6px 0;
    min-height: 48px;
    justify-content:center;
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 700;
  }
  .tab.active{ color: var(--primary-deep); }
  .tab svg{ stroke: currentColor; }
</style>
</head>
<body>
<div class="screen">
  <header>
    <div class="app-name">投顧戰情室</div>
    <div class="freshness"><span class="dot"></span>07-18 08:30 已更新</div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>輸入台股代號，立刻分析</span>
    </div>
  </div>

  <section>
    <div class="summary-card">
      <div class="summary-top">
        <div class="market-status">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18L10 10L14 14L20 6"/><path d="M15 6H20V11"/></svg>
          偏空防禦
        </div>
        <div class="risk-meter">
          <div class="label">風險溫度</div>
          <div class="value mono">8<small>/10</small></div>
        </div>
      </div>
      <div class="conclusion">今天<span class="accent">不加碼</span>，守好停損位。</div>
    </div>
  </section>

  <section>
    <div class="section-title">我的持股</div>
    <div class="holding-card">
      <div class="holding-top">
        <div class="holding-name">
          <div class="name">台積電</div>
          <div class="code mono">2330</div>
        </div>
        <div class="holding-price">
          <div class="price mono">2,440</div>
        </div>
      </div>
      <div class="holding-meta">
        <span class="tag">核心續扣</span>
        <span class="tag neutral">波段不加碼</span>
        <span class="tag stop">防守價 2,245</span>
      </div>
    </div>
    <div class="holding-card">
      <div class="holding-top">
        <div class="holding-name">
          <div class="name">0050</div>
          <div class="code mono">元大台灣50</div>
        </div>
      </div>
      <div class="holding-meta">
        <span class="tag">定期定額照常</span>
        <span class="tag neutral">不受本週訊號影響</span>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title">觀察清單</div>
    <div class="watch-card">
      <div class="watch-left">
        <div class="name">聯發科</div>
        <div class="code mono">2454</div>
      </div>
      <div class="watch-right">等站回 MA20</div>
    </div>
    <div class="watch-card">
      <div class="watch-left">
        <div class="name">中華電</div>
        <div class="code mono">2412</div>
      </div>
      <div class="watch-right">等法人回補</div>
    </div>
  </section>

  <nav class="tabbar">
    <div class="tab active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11L12 3L21 11"/><path d="M5 10V20H19V10"/></svg>
      今日
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      持股
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="6"/><line x1="20" y1="20" x2="14.5" y2="14.5"/><path d="M7 10L9 12L13 8"/></svg>
      查股票
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21H16"/><path d="M12 17V21"/><path d="M7 4H17V9A5 5 0 0 1 7 9V4Z"/><path d="M7 5H4V6A3 3 0 0 0 7 9"/><path d="M17 5H20V6A3 3 0 0 1 17 9"/></svg>
      戰績
    </div>
  </nav>
</div>
</body>
</html>
