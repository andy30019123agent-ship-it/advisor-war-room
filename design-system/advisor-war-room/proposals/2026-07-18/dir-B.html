<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>投顧戰情室 – 方向 B 礦物訊號</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EFF2EA;
    --card: #F7F8F3;
    --line: #CBD1C0;
    --ink: #1A1D14;
    --ink-text: #E8EBE0;
    --lime: #C7F04A;
    --lime-deep: #9CC229;
    --copper: #A85C3A;
    --text: #23271C;
    --text-soft: #565E4B;
    --text-faint: #8B9280;
    --green: #4C8A3F;
    --red: #B24A3C;
  }
  *{ box-sizing: border-box; margin:0; padding:0; }
  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans TC', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    overflow-x: hidden;
  }
  .display{ font-family: 'Space Grotesk', sans-serif; }
  .mono{ font-family: 'IBM Plex Mono', monospace; }
  .screen{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 104px;
    position: relative;
  }
  header{
    padding: 22px 20px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--line);
  }
  .app-name{
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .freshness{
    display:inline-flex;
    align-items:center;
    gap:7px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    border: 1px solid var(--line);
    padding: 6px 10px;
    border-radius: 3px;
  }
  .freshness .dot{
    width:7px; height:7px; border-radius:50%; background: var(--lime-deep);
  }
  .search-wrap{ padding: 18px 20px; }
  .search-bar{
    display:flex;
    align-items:center;
    gap:10px;
    background: var(--ink);
    border-radius: 4px;
    padding: 15px 16px;
    min-height: 52px;
  }
  .search-bar svg{ flex-shrink:0; color: var(--lime); }
  .search-bar span{
    font-size: 16px;
    font-weight: 500;
    color: var(--ink-text);
  }
  section{ padding: 0 20px 8px; }
  .section-title{
    font-size: 12px;
    font-weight: 700;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-top: 22px;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .section-title::before{
    content:"";
    width: 12px;
    height: 1px;
    background: var(--copper);
  }
  /* Summary card */
  .summary-card{
    background: var(--ink);
    color: var(--ink-text);
    border-radius: 6px;
    padding: 24px 22px;
  }
  .summary-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 18px;
    border-bottom: 1px solid rgba(232,235,224,0.16);
  }
  .market-status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    color: var(--lime);
    font-weight: 700;
    font-size: 15px;
  }
  .market-status svg{ color: var(--lime); }
  .risk-meter{ text-align:right; }
  .risk-meter .label{ font-size:11px; color:#9BA091; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:4px;}
  .risk-meter .value{ font-size:28px; font-weight:700; color: #E8B84A; line-height:1; }
  .risk-meter .value small{ font-size:14px; color:#9BA091; font-weight:500; }
  .conclusion{
    font-size: 22px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--ink-text);
  }
  .conclusion .accent{ color: var(--lime); font-weight: 700; }
  /* Holdings */
  .holding-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px;
    margin-bottom: 12px;
  }
  .holding-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .holding-name{ display:flex; flex-direction:column; gap:3px; }
  .holding-name .name{ font-size:17px; font-weight:700; }
  .holding-name .code{ font-size:12px; color:var(--text-faint); font-weight:500; letter-spacing:0.5px; }
  .holding-price{ text-align:right; }
  .holding-price .price{ font-size:20px; font-weight:600; }
  .holding-meta{
    display:flex;
    flex-wrap:wrap;
    gap: 10px 18px;
  }
  .meta-item{ display:flex; align-items:center; gap:7px; font-size:13.5px; font-weight:600; color: var(--text-soft); }
  .meta-item .swatch{ width:8px; height:8px; border-radius:2px; flex-shrink:0; }
  .meta-item.stop .swatch{ background: var(--copper); }
  .meta-item.stop{ color: var(--copper); }
  .meta-item.go .swatch{ background: var(--lime-deep); }
  /* Watchlist */
  .watch-card{
    border-bottom: 1px solid var(--line);
    padding: 13px 2px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .watch-card:last-child{ border-bottom:none; }
  .watch-left{ display:flex; align-items:baseline; gap:8px; }
  .watch-left .name{ font-size:15px; font-weight:600; color: var(--text); }
  .watch-left .code{ font-size:12px; color: var(--text-faint); }
  .watch-right{
    font-size: 12.5px;
    color: var(--copper);
    font-weight: 600;
  }
  /* Tab bar */
  .tabbar{
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: var(--ink);
    display:flex;
    padding: 10px 8px calc(8px + env(safe-area-inset-bottom));
  }
  .tab{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 5px;
    padding: 6px 0;
    min-height: 48px;
    justify-content:center;
    color: #7A806E;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .tab.active{ color: var(--lime); }
  .tab svg{ stroke: currentColor; }
</style>
</head>
<body>
<div class="screen">
  <header>
    <div class="app-name display">投顧戰情室</div>
    <div class="freshness"><span class="dot"></span>07-18 08:30 已更新</div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>輸入台股代號，立刻分析</span>
    </div>
  </div>

  <section>
    <div class="summary-card">
      <div class="summary-top">
        <div class="market-status">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18L10 10L14 14L20 6"/><path d="M15 6H20V11"/></svg>
          偏空防禦
        </div>
        <div class="risk-meter">
          <div class="label">風險溫度</div>
          <div class="value mono">8<small>/10</small></div>
        </div>
      </div>
      <div class="conclusion">今天<span class="accent">不加碼</span>，守好停損位。</div>
    </div>
  </section>

  <section>
    <div class="section-title">我的持股</div>
    <div class="holding-card">
      <div class="holding-top">
        <div class="holding-name">
          <div class="name">台積電</div>
          <div class="code mono">2330</div>
        </div>
        <div class="holding-price">
          <div class="price mono">2,440</div>
        </div>
      </div>
      <div class="holding-meta">
        <div class="meta-item go"><span class="swatch"></span>核心續扣</div>
        <div class="meta-item"><span class="swatch" style="background:#8B9280"></span>波段不加碼</div>
        <div class="meta-item stop"><span class="swatch"></span>防守價 2,245</div>
      </div>
    </div>
    <div class="holding-card">
      <div class="holding-top">
        <div class="holding-name">
          <div class="name">0050</div>
          <div class="code mono">元大台灣50</div>
        </div>
      </div>
      <div class="holding-meta">
        <div class="meta-item go"><span class="swatch"></span>定期定額照常</div>
        <div class="meta-item"><span class="swatch" style="background:#8B9280"></span>不受本週訊號影響</div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title">觀察清單</div>
    <div class="watch-card">
      <div class="watch-left">
        <div class="name">聯發科</div>
        <div class="code mono">2454</div>
      </div>
      <div class="watch-right">等站回 MA20</div>
    </div>
    <div class="watch-card">
      <div class="watch-left">
        <div class="name">中華電</div>
        <div class="code mono">2412</div>
      </div>
      <div class="watch-right">等法人回補</div>
    </div>
  </section>

  <nav class="tabbar">
    <div class="tab active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11L12 3L21 11"/><path d="M5 10V20H19V10"/></svg>
      今日
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      持股
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="6"/><line x1="20" y1="20" x2="14.5" y2="14.5"/><path d="M7 10L9 12L13 8"/></svg>
      查股票
    </div>
    <div class="tab">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21H16"/><path d="M12 17V21"/><path d="M7 4H17V9A5 5 0 0 1 7 9V4Z"/><path d="M7 5H4V6A3 3 0 0 0 7 9"/><path d="M17 5H20V6A3 3 0 0 1 17 9"/></svg>
      戰績
    </div>
  </nav>
</div>
</body>
</html>
