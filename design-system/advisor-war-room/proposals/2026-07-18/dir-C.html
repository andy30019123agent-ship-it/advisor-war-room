<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>投顧戰情室 – 方向 C iOS 原生感</title>
<style>
  :root{
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --hairline: #D8D8DE;
    --accent: #4A55C7;
    --text: #1C1C1E;
    --text-soft: #6C6C70;
    --text-faint: #9A9AA0;
    --green: #1D8A4E;
    --red: #D6392C;
    --amber-bg: #FFF1DE;
    --amber-text: #B26A11;
  }
  *{ box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang TC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    overflow-x: hidden;
  }
  .mono{ font-variant-numeric: tabular-nums; font-weight: 600; }
  .screen{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: 104px;
    position: relative;
  }
  header{
    padding: 8px 16px 4px;
  }
  .top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 8px 0 2px;
  }
  .freshness{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--green);
  }
  .freshness .dot{
    width:6px; height:6px; border-radius:50%; background: var(--green);
  }
  .large-title{
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 0.3px;
    padding: 4px 0 12px;
  }
  .search-wrap{ padding: 0 16px 8px; }
  .search-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background: rgba(118,118,128,0.12);
    border-radius: 12px;
    padding: 12px 12px;
    min-height: 44px;
  }
  .search-bar svg{ flex-shrink:0; color: var(--text-faint); }
  .search-bar span{
    font-size: 16px;
    font-weight: 400;
    color: var(--text-faint);
  }
  .group{ padding: 0 16px 8px; }
  .group-title{
    font-size: 13px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin: 20px 4px 8px;
  }
  /* Summary card */
  .summary-card{
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
  }
  .summary-inner{ padding: 18px 16px; }
  .summary-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 14px;
  }
  .market-status{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background: var(--amber-bg);
    color: var(--amber-text);
    font-weight: 700;
    font-size: 14.5px;
    padding: 6px 12px;
    border-radius: 8px;
  }
  .risk-meter{ display:flex; align-items:baseline; gap:4px; }
  .risk-meter .label{ font-size:13px; color:var(--text-faint); font-weight:500; margin-right:2px;}
  .risk-meter .value{ font-size:20px; font-weight:800; color: var(--red); }
  .risk-meter .value small{ font-size:13px; color:var(--text-faint); font-weight:500; }
  .hairline{ height:1px; background: var(--hairline); margin: 0 16px; }
  .conclusion{
    font-size: 21px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
    padding: 16px;
  }
  .conclusion .accent{ color: var(--accent); }
  /* Holdings list group */
  .list-card{
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
  }
  .list-row{
    padding: 14px 16px;
  }
  .list-row + .list-row{ border-top: 1px solid var(--hairline); }
  .row-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom: 8px;
  }
  .row-name{ display:flex; align-items:baseline; gap:8px; }
  .row-name .name{ font-size:17px; font-weight:600; }
  .row-name .code{ font-size:13px; color:var(--text-faint); }
  .row-price{ font-size:19px; font-weight:700; }
  .row-tags{
    display:flex;
    flex-wrap:wrap;
    gap: 8px;
  }
  .pill{
    font-size: 13px;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(74,85,199,0.1);
    color: var(--accent);
  }
  .pill.stop{
    background: rgba(214,57,44,0.1);
    color: var(--red);
  }
  .pill.neutral{
    background: rgba(118,118,128,0.12);
    color: var(--text-soft);
  }
  /* Watchlist */
  .watch-row{
    padding: 12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .watch-row + .watch-row{ border-top: 1px solid var(--hairline); }
  .watch-left{ display:flex; align-items:baseline; gap:8px; }
  .watch-left .name{ font-size:15.5px; font-weight:500; color: var(--text); }
  .watch-left .code{ font-size:12.5px; color: var(--text-faint); }
  .watch-right{
    font-size: 13px;
    color: var(--text-faint);
    font-weight: 500;
    display:flex;
    align-items:center;
    gap: 4px;
  }
  .chevron{ color: #C7C7CC; }
  /* Tab bar */
  .tabbar{
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(249,249,249,0.94);
    backdrop-filter: blur(20px);
    border-top: 0.5px solid var(--hairline);
    display:flex;
    padding: 6px 0 calc(4px + env(safe-area-inset-bottom));
  }
  .tab{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 3px;
    padding: 4px 0;
    min-height: 48px;
    justify-content:center;
    color: #8E8E93;
    font-size: 10.5px;
    font-weight: 500;
  }
  .tab.active{ color: var(--accent); }
  .tab svg{ stroke: currentColor; }
</style>
</head>
<body>
<div class="screen">
  <header>
    <div class="top-row">
      <div class="freshness"><span class="dot"></span>07-18 08:30 已更新</div>
    </div>
    <div class="large-title">投顧戰情室</div>
  </header>

  <div class="search-wrap">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>輸入台股代號，立刻分析</span>
    </div>
  </div>

  <div class="group">
    <div class="summary-card">
      <div class="summary-inner">
        <div class="summary-top">
          <div class="market-status">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18L10 10L14 14L20 6"/><path d="M15 6H20V11"/></svg>
            偏空防禦
          </div>
          <div class="risk-meter">
            <span class="label">風險溫度</span>
            <span class="value mono">8<small>/10</small></span>
          </div>
        </div>
      </div>
      <div class="hairline"></div>
      <div class="conclusion">今天<span class="accent">不加碼</span>，守好停損位。</div>
    </div>
  </div>

  <div class="group-title">我的持股</div>
  <div class="group">
    <div class="list-card">
      <div class="list-row">
        <div class="row-top">
          <div class="row-name">
            <span class="name">台積電</span>
            <span class="code mono">2330</span>
          </div>
          <div class="row-price mono">2,440</div>
        </div>
        <div class="row-tags">
          <span class="pill">核心續扣</span>
          <span class="pill neutral">波段不加碼</span>
          <span class="pill stop">防守價 2,245</span>
        </div>
      </div>
      <div class="list-row">
        <div class="row-top">
          <div class="row-name">
            <span class="name">0050</span>
            <span class="code">元大台灣50</span>
          </div>
        </div>
        <div class="row-tags">
          <span class="pill">定期定額照常</span>
          <span class="pill neutral">不受本週訊號影響</span>
        </div>
      </div>
    </div>
  </div>

  <div class="group-title">觀察清單</div>
  <div class="group">
    <div class="list-card">
      <div class="watch-row">
        <div class="watch-left">
          <span class="name">聯發科</span>
          <span class="code mono">2454</span>
        </div>
        <div class="watch-right">
          等站回 MA20
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6L15 12L9 18"/></svg>
        </div>
      </div>
      <div class="watch-row">
        <div class="watch-left">
          <span class="name">中華電</span>
          <span class="code mono">2412</span>
        </div>
        <div class="watch-right">
          等法人回補
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6L15 12L9 18"/></svg>
        </div>
      </div>
    </div>
  </div>

  <nav class="tabbar">
    <div class="tab active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11L12 3L21 11"/><path d="M5 10V20H19V10"/></svg>
      今日
    </div>
    <div class="tab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      持股
    </div>
    <div class="tab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="6"/><line x1="20" y1="20" x2="14.5" y2="14.5"/><path d="M7 10L9 12L13 8"/></svg>
      查股票
    </div>
    <div class="tab">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21H16"/><path d="M12 17V21"/><path d="M7 4H17V9A5 5 0 0 1 7 9V4Z"/><path d="M7 5H4V6A3 3 0 0 0 7 9"/><path d="M17 5H20V6A3 3 0 0 1 17 9"/></svg>
      戰績
    </div>
  </nav>
</div>
</body>
</html>
